name: RetroTrace Taiwan Daily Check
on:
  schedule:
    # 台灣時間週一至週五 13:00 執行 (UTC 05:00)
    - cron: '00 4 * * 1-5'
  workflow_dispatch: # 允許你手動點擊按鈕執行測試
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 複製程式碼
        uses: actions/checkout@v4
      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安裝必要套件
        run: |
          pip install -r requirements.txt
      - name: 執行回檔監控
        env:
          # 從 GitHub Secrets 讀取變數
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          TRIGGER_EVENT: ${{ github.event_name }}
        run: python retro_trace_github.py
